<p>
HTTP was created by Tim Berners-Lee in the early 1990s.
The first version, HTTP/0.9, only supported simple requests.
</p>

<h2>HTTP/1.0</h2>
<ul>
    <li>Added headers</li>
    <li>Added status codes</li>
</ul>

<h2>HTTP/1.1</h2>
<p>
Introduced persistent connections and improved performance.
